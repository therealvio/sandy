name: release

# Filename must remain release.yml: npm trusted publishing matches the caller
# workflow filename. Each npm package registers jamestelfer/sandy + release.yml
# as its trusted publisher, so renaming this file breaks npm publication.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: chinmina/.github/.github/workflows/goreleaser-release.yml@verified-actions
    with:
      token-source: octo-sts
      disable-npm: false
      npm-package-name: "@jamestelfer/sandy"
    secrets: inherit
